name: lawhub
description: LawHub Application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.7.0
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  # ===== FIREBASE =====
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # ===== STRIPE =====
  flutter_stripe: ^12.6.0

  agora_rtc_engine: ^6.3.0




  # ===== UI COMPONENTS =====
  carousel_slider: ^5.0.0
  curved_navigation_bar: ^1.0.6
  flutter_svg: ^2.0.10+1
  fluttertoast: ^8.2.8
  image_picker: ^1.1.2
  pinput: ^5.0.0
  flutter_spinkit: ^5.2.1
  font_awesome_flutter: ^10.7.0

  # ===== UTILITIES =====
  http: ^1.2.2
  intl: ^0.20.2  # FIXED: Must be 0.20.2 (required by flutter_localizations)
  multi_select_flutter: ^4.1.3  # REPLACED: Better alternative to multiselect
  snippet_coder_utils: ^1.0.14
  flutter_dotenv: ^5.1.0
  web_socket_channel: ^2.4.0

  cupertino_icons: ^1.0.8



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env

  fonts:
    - family: patua
      fonts:
        - asset: assets/fonts/PatuaOne-Regular.ttf
    - family: roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf